openapi: 3.0.3
info:
  title: Taskmaster API
  description: API for managing user tasks with OAuth or API Key authentication in Taskmaster
  version: 1.0.0
  contact:
    name: API Support
  license:
    name: MIT

security:
  - apiKey: []

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Provide your API key via the `X-API-Key` header.
        This API also accepts `Authorization: Bearer <token>` for OAuth tokens
        and will treat `Authorization: Bearer <apiKey>` as an API key for convenience.

  schemas:
    TaskStatus:
      type: string
      enum: [backlog, triage, todo, in_progress, done, canceled]
      description: Current status of the task
      example: 'todo'

    RelationshipType:
      type: string
      enum: [blocks, relates_to, duplicates]
      description: Defines how one task relates to another.
      example: 'blocks'

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the task
        title:
          type: string
          maxLength: 255
          description: Title of the task
        description:
          type: string
          maxLength: 500
          description: Detailed description of the task
        created_by:
          type: string
          description: ID of the user who created this task
        project_id:
          type: string
          format: uuid
          description: ID of the project this task belongs to (optional)
        status:
          $ref: '#/components/schemas/TaskStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, title, description, created_by]

    TaskRelationship:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the task relationship
        task_id:
          type: string
          format: uuid
        relates_to_task_id:
          type: string
          format: uuid
        relationship_type:
          $ref: '#/components/schemas/RelationshipType'
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, task_id, relates_to_task_id, relationship_type, created_by]

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 500
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, description]

    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer

paths:
  /api/tasks:
    post:
      operationId: createTask
      summary: Create a new task
      description: Creates a new task for the authenticated user.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                description:
                  type: string
                  minLength: 1
                  maxLength: 500
                project_id:
                  type: string
                  format: uuid
                status:
                  $ref: '#/components/schemas/TaskStatus'
              required: [title, description]
      responses:
        '201':
          description: Task successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    get:
      operationId: getTasks
      summary: Get all tasks for authenticated user
      description: Retrieves all tasks belonging to the authenticated user. Optionally filter by project.
      security:
        - apiKey: []
      parameters:
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully retrieved tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '400':
          description: Bad Request

  /api/tasks/{id}:
    put:
      operationId: updateTask
      summary: Update a specific task
      description: Updates a task by ID. Provide only fields you want to change.
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 255
                description:
                  type: string
                  maxLength: 500
                status:
                  $ref: '#/components/schemas/TaskStatus'
                project_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Task successfully updated
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
    delete:
      operationId: deleteTask
      summary: Delete a specific task
      description: Deletes a task by ID belonging to the authenticated user.
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Task successfully deleted
        '401':
          description: Unauthorized
        '400':
          description: Bad Request
        '404':
          description: Not Found

  /api/tasks/{task_id}/relationships:
    get:
      operationId: getTaskRelationships
      summary: Get all relationships for a specific task
      description: Retrieves all relationships for a task. Optionally filter by type.
      security:
        - apiKey: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: relationship_type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/RelationshipType'
      responses:
        '200':
          description: Successfully retrieved task relationships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskRelationship'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      operationId: createTaskRelationship
      summary: Create a new task relationship
      description: Creates a relationship between two tasks.
      security:
        - apiKey: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  $ref: '#/components/schemas/RelationshipType'
                target_task_id:
                  type: string
                  format: uuid
              required: [type, target_task_id]
      responses:
        '201':
          description: Task relationship successfully created
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '409':
          description: Conflict
        '500':
          description: Internal Server Error

  /api/tasks/{task_id}/relationships/{relationship_id}:
    put:
      operationId: updateTaskRelationship
      summary: Update a specific task relationship
      description: Updates the relationship type for a specific task relationship.
      security:
        - apiKey: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: relationship_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                relationship_type:
                  $ref: '#/components/schemas/RelationshipType'
              required: [relationship_type]
      responses:
        '200': { description: Task relationship successfully updated }
        '400': { description: Bad Request }
        '401': { description: Unauthorized }
        '404': { description: Not Found }
        '500': { description: Internal Server Error }
    delete:
      operationId: deleteTaskRelationship
      summary: Delete a specific task relationship
      description: Deletes a task relationship belonging to the authenticated user.
      security:
        - apiKey: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: relationship_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204': { description: Task relationship successfully deleted }
        '400': { description: Bad Request }
        '401': { description: Unauthorized }
        '404': { description: Not Found }
        '500': { description: Internal Server Error }

  /api/projects:
    post:
      operationId: createProject
      summary: Create a new project
      description: Creates a new project for the authenticated user.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                description:
                  type: string
                  minLength: 1
                  maxLength: 500
              required: [name, description]
      responses:
        '201': { description: Project successfully created }
        '400': { description: Bad Request }
        '401': { description: Unauthorized }
        '500': { description: Internal Server Error }
    get:
      operationId: getProjects
      summary: Get all projects for authenticated user
      description: Retrieves all projects belonging to the authenticated user.
      security:
        - apiKey: []
      responses:
        '200':
          description: Successfully retrieved projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '401': { description: Unauthorized }
        '400': { description: Bad Request }

  /api/projects/{id}:
    delete:
      operationId: deleteProject
      summary: Delete a specific project
      description: Deletes a project by ID belonging to the authenticated user.
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204': { description: Project successfully deleted }
        '401': { description: Unauthorized }
        '400': { description: Bad Request }
        '404': { description: Not Found }

tags:
  - name: tasks
    description: Operations related to task management in Taskmaster
  - name: projects
    description: Operations related to project management in Taskmaster
